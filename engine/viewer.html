<!doctype html>
<meta charset="utf-8">
<title>VaultVision</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; overflow: hidden; background: #000;
    transition: background .5s; }
  /* lights on: bright 3D room. Scoped off in flat mode — there the same
     button/icon means something else (ambient on/off), see #hud below.
     #label no longer needs a color flip here: it now sits on #hud's own
     dark backdrop, which stays dark regardless of room brightness. */
  body.lit:not(.flat) { background: #fff; }
  body.lit:not(.flat) #amb { display: none; }
  /* flat mode: the lights button instead disables the ambient fill, its own
     setting entirely separate from 3D's room-lit toggle above */
  body.flat.ambientOff #amb { display: none; }
  /* matches the show-info screen's back button: a solid dark pill, so it
     reads the same regardless of room brightness in 3D's "lit" mode —
     no separate lit-mode color override needed any more. */
  #back { position: fixed; top: 16px; left: 16px; width: 40px; height: 40px;
    display: grid; place-items: center; border-radius: 50%; color: #e8def8;
    background: #1c0f3a; border: 1px solid #b23bff40; cursor: pointer;
    z-index: 3; user-select: none; text-decoration: none;
    opacity: .95; transition: opacity .4s; }
  #back:hover { border-color: #34e0ff; color: #34e0ff; }
  /* fades with the HUD (same idle timer); 3D mode never hides it, matching
     the settings/lights/3D-toggle buttons that also stay on there */
  #back.idle { opacity: 0; pointer-events: none; }
  body:not(.flat) #back.idle { opacity: .95; pointer-events: auto; }

  /* bottom HUD: title + scrubber + timestamps + transport + volume + buttons,
     one semi-transparent pane pinned to the bottom ~10% of the viewport, on
     top of the video — flat mode only. In 3D mode the pane chrome and every
     flat-only control disappear entirely (the physical cabinet already has
     its own volume/seek buttons there); only settings/lights/3D-toggle stay
     on screen, sitting at the same bottom-right spot #hudBtns occupies in
     flat mode (see body:not(.flat) rules below), never auto-hiding. Accents
     here use the main guide's neon-gradient palette; the OSD canvas
     (settings/guide/popups) keeps its own green NEON — a separate "TV menu"
     system this pane doesn't touch. */
  #hud { position: fixed; left: 0; right: 0; bottom: 0; z-index: 2;
    min-height: 112px; height: 12vh; max-height: 150px;
    display: flex; flex-direction: column; justify-content: center; gap: 8px;
    padding: 10px 20px; box-sizing: border-box;
    opacity: .95; transition: opacity .4s; }
  body.flat #hud { background: rgba(12, 10, 31, .82); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); border-top: 1px solid #b23bff40; }
  #hud.idle { opacity: 0; pointer-events: none; }
  /* 3D mode: ignore idle-fade entirely, the surviving buttons always stay on */
  body:not(.flat) #hud.idle { opacity: .95; pointer-events: auto; }
  /* everything except #hudBtns is flat-mode-only chrome. !important: #cc's
     caption-loaded JS sets an inline display:block, which would otherwise
     outrank this and leave CC visible in 3D mode. */
  body:not(.flat) .flat-only { display: none !important; }
  #label { max-width: 100%; display: flex; align-items: center; gap: 8px;
    font: 14px VCR, monospace; color: #e8def8; opacity: .85; }
  /* flex: 0 1 auto (not 1 1 auto): hugs the text's own width instead of
     stretching to fill the row, so the globe icon sits right after the title
     instead of pinned to the row's far edge. min-width:0 lets it still shrink
     and clip (triggering the marquee) when a long title runs out of room. */
  #labelTextWrap { overflow: hidden; white-space: nowrap; min-width: 0; flex: 0 1 auto; }
  #labelText { display: inline-block; }
  /* only added when the text is wider than #labelTextWrap's clamped max-width;
     the JS duplicates the text first so translateX(-50%) loops seamlessly */
  #label.marquee #labelText { animation-name: marquee; animation-timing-function: linear;
    animation-iteration-count: infinite; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  /* source link: the current episode's archive.org item, opened in a new tab —
     sits outside #labelTextWrap so it never gets clipped or dragged into the marquee */
  #sourceLink { flex: 0 0 auto; display: flex; color: #b6a9d6; }
  #sourceLink svg { width: 16px; height: 16px; display: block; }
  #sourceLink:hover { color: #e8def8; }
  /* row 1: scrubber, on its own */
  #scrubRow { display: flex; align-items: center; gap: 12px; }
  #scrubRow .t { font: 12px VCR, monospace; color: #34e0ff; opacity: .9; min-width: 3.5em; }
  #scrubRow .t.dur { text-align: right; }
  /* row 2: transport (prev/play-pause/next, grouped) + volume + the rest */
  #ctrlRow { display: flex; align-items: center; gap: 18px; }
  #transportGroup { display: flex; align-items: center; gap: 14px; flex: 0 0 auto; }
  .transport { color: #e8def8; cursor: pointer; user-select: none; position: relative; }
  .transport svg { width: 28px; height: 28px; display: block; }
  .transport:hover { color: #34e0ff; }
  #playPause .ic-pause { display: none; }
  #playPause.playing .ic-play { display: none; }
  #playPause.playing .ic-pause { display: block; }
  #scrub { flex: 1 1 auto; height: 16px; display: flex; align-items: center;
    cursor: pointer; touch-action: none; }
  #scrub .track { position: relative; width: 100%; height: 5px; border-radius: 3px;
    background: #ffffff26; }
  #scrub .fill { position: absolute; inset: 0; width: 0%; border-radius: 3px;
    background: linear-gradient(90deg, #ff2d95, #b23bff, #34e0ff); }
  #scrub .thumb { position: absolute; top: 50%; left: 0%; width: 13px; height: 13px;
    border-radius: 50%; background: #34e0ff; transform: translate(-50%, -50%);
    box-shadow: 0 0 8px #34e0ff99; }
  #volSlider { width: 90px; accent-color: #34e0ff; flex: 0 0 auto; }
  #hudBtns { display: flex; gap: 18px; flex: 0 0 auto; margin-left: auto; }
  #cc { display: none; } /* shown once a captions track actually loads, see load() */
  #hudBtns > div { color: #b6a9d6; cursor: pointer; user-select: none; position: relative; }
  #hudBtns > div svg { width: 24px; height: 24px; display: block; }
  #hudBtns > div:hover { color: #e8def8; }
  #mode3d.on, #mode3d.on:hover { color: #34e0ff; } /* on = currently in 3D mode */
  #cc.on, #cc.on:hover { color: #34e0ff; }
  body.lit:not(.flat) #lights { color: #34e0ff; }
  /* flat mode, ambient disabled: cross out the lights icon */
  #lights .off-slash { display: none; position: absolute; inset: 0; }
  #lights.off .off-slash { display: block; }

  /* flat-mode pause icon: neutral gray, centered, replaces the 3D-only green
     corner bars so playback state doesn't lean on the reserved neon color */
  #pauseIcon { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 2; display: none; color: #ffffffb0; pointer-events: none; }
  #pauseIcon.show { display: block; }
  #pauseIcon svg { width: 64px; height: 64px; display: block;
    filter: drop-shadow(0 2px 10px #00000090); }
  /* buffering spinner: same in both modes, intentionally subtle */
  #bufferSpin { position: fixed; top: 50%; left: 50%; width: 26px; height: 26px;
    margin: -13px 0 0 -13px; z-index: 2; display: none; pointer-events: none;
    border: 3px solid #ffffff30; border-top-color: #ffffff90; border-radius: 50%;
    animation: bufferSpin .9s linear infinite; }
  #bufferSpin.show { display: block; }
  @keyframes bufferSpin { to { transform: rotate(360deg); } }

  /* flat-mode settings panel: positioned above #hud (JS sets --hud-h to its
     real measured height) so it never gets cut off by the pane underneath. */
  #flatSettings { position: fixed; right: 20px; bottom: calc(var(--hud-h, 130px) + 16px);
    z-index: 3; width: 300px; max-height: calc(100vh - var(--hud-h, 130px) - 48px);
    overflow-y: auto; box-sizing: border-box; padding: 16px 18px;
    background: rgba(12, 10, 31, .92); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); border: 1px solid #b23bff40; border-radius: 8px;
    font: 14px VCR, monospace; color: #e8def8;
    display: none; }
  #flatSettings.open { display: block; }
  #flatSettings h2 { margin: 0 0 12px; font-size: 1em; letter-spacing: 2px; color: #ff6fc7; }
  .fsRow { display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 7px 4px; border-radius: 4px; }
  .fsRow.fsFocus { background: #21123f; outline: 2px solid #b23bff; }
  .fsRow input[type=range] { width: 130px; accent-color: #34e0ff; }
  .fsRow input[type=checkbox] { accent-color: #34e0ff; width: 16px; height: 16px; }
  #fsFooter { display: flex; gap: 10px; margin-top: 14px; }
  #fsFooter button { flex: 1 1 auto; font: 13px VCR, monospace; letter-spacing: 1px;
    padding: 8px; border-radius: 5px; border: 1px solid #b23bff40; cursor: pointer;
    background: #1c0f3a; color: #e8def8; }
  #fsFooter button:hover, #fsFooter button.fsFocus { border-color: #34e0ff; color: #34e0ff; }

  /* flat-mode episode list: same corner/sizing rules as #flatSettings, just
     wider (episode titles run long) and with a scrollable body instead of
     a handful of setting rows. */
  #flatEpisodes { position: fixed; right: 20px; bottom: calc(var(--hud-h, 130px) + 16px);
    z-index: 3; width: 360px;
    /* a fixed height (clamped for short viewports), not max-height — with only
       max-height the panel shrinks to fit whatever the current season has,
       so its top edge (and the scrollable area under your cursor) moves
       every time you switch to a season with fewer episodes */
    height: min(480px, calc(100vh - var(--hud-h, 130px) - 48px));
    box-sizing: border-box; padding: 16px 18px 8px;
    background: rgba(12, 10, 31, .92); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); border: 1px solid #b23bff40; border-radius: 8px;
    font: 14px VCR, monospace; color: #e8def8;
    display: none; flex-direction: column; }
  #flatEpisodes.open { display: flex; }
  #flatEpisodes h2 { margin: 0 0 12px; font-size: 1em; letter-spacing: 2px; color: #ff6fc7; flex: 0 0 auto; }
  /* min-width: 0 is load-bearing here — a flex child defaults to min-width:
     auto, which lets it grow past the panel to fit every tab instead of
     clipping+scrolling internally. Without it overflow-x:auto never engages. */
  #feTabs { display: flex; gap: 6px; overflow-x: auto; flex: 0 0 auto; min-width: 0;
    margin-bottom: 8px; scrollbar-width: none; }
  #feTabs::-webkit-scrollbar { display: none; }
  #feTabs button { flex: 0 0 auto; font: 12px VCR, monospace; letter-spacing: 1px;
    padding: 5px 10px; border-radius: 5px; border: 1px solid #b23bff40; cursor: pointer;
    background: #1c0f3a88; color: #e8def8; opacity: .7; }
  #feTabs button.active { opacity: 1; color: #ff6fc7; border-color: #ff2d95; }
  #feBody { overflow-y: auto; flex: 1 1 auto; min-height: 0; padding-bottom: 8px; }
  .feRow { padding: 8px 6px; border-radius: 4px; cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .feRow:hover, .feRow.feFocus { background: #21123f; outline: 2px solid #b23bff; }
  .feRow.current { color: #34e0ff; }
  video::cue { color: #39ff14; background: rgba(0, 0, 0, .6);
    font-family: VCR, monospace; }
  #stage { position: absolute; inset: 0; }
  #stage > div { pointer-events: none; } /* css3d layer: canvas gets all input */
  /* the screen: a real <video> glued into the 3D scene by CSS3DRenderer.
     the browser only DISPLAYS it (no pixel access), so no CORS, no proxy. */
  #screen { width: 800px; height: 600px; background: #000; position: relative;
    backface-visibility: hidden; border-radius: 26px; overflow: hidden; }
  #screen video, #screen canvas { position: absolute; inset: 0;
    width: 100%; height: 100%; }
  #screen video { object-fit: fill; }
  /* CRT barrel bulge on the picture + OSD canvas — both should curve with the
     glass. #fx's scanlines stay crisp on top: bulging their regular repeat
     with the same displacement map turns it into moire/banding */
  #screen video#v, #screen canvas { filter: url(#bulge); }
  #screen canvas { z-index: 1; }
  /* flat mode: default view, edge-to-edge video at its real aspect ratio.
     #screen gets pulled out of the CSS3D scene and centered here instead. */
  #flatScreen { position: fixed; inset: 0; z-index: 0; display: flex;
    align-items: center; justify-content: center;
    pointer-events: none; } /* canvas above still gets all input, same as 3D mode */
    /* no background here: body's own black shows through the letterbox
       bars so the ambient glow (behind, z-index -1) isn't blocked */
  body:not(.flat) #flatScreen { display: none; }
  body.flat #screen { border-radius: 0; }
  /* ambilight: a blurred twin of the video washing the room behind the TV.
     centered with margins rather than a transform, so the transform slot is
     free for the picture crop (applyCrop), which needs transform-origin 0 0 */
  #amb { position: fixed; left: 50%; top: 45%; width: 190vmin; height: 140vmin;
    margin-left: -95vmin; margin-top: -70vmin; transform-origin: 0 0;
    object-fit: fill; opacity: .85;
    filter: blur(100px) saturate(1.4) brightness(1.1); z-index: -1;
    -webkit-mask-image: radial-gradient(ellipse 50% 50% at center, #000 55%, #0000 100%);
    mask-image: radial-gradient(ellipse 50% 50% at center, #000 55%, #0000 100%); }
  /* flat mode: full-bleed ambient fill behind the letterboxed video */
  body.flat #amb { left: 0; top: 0; margin: 0; width: 100vw; height: 100vh;
    object-fit: cover; opacity: 1;
    -webkit-mask-image: none; mask-image: none; }
  /* glass effects: faint scanlines + corner vignette — display-only */
  #fx { position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      repeating-linear-gradient(0deg, #0000 0 2px, rgba(0,0,0,.08) 2px 3px),
      radial-gradient(ellipse at center, #0000 60%, rgba(0,0,0,.4) 100%); }
</style>
<video id="amb" muted playsinline></video>
<div id="stage"></div>
<div id="flatScreen"></div>
<div id="screen"><video id="v" playsinline></video><div id="fx"></div></div>
<svg width="0" height="0" style="position:absolute">
  <!-- sRGB: without it the map's neutral 128 reads as 0.216 in linearRGB and
       the whole image shifts up-left, showing the page behind the screen hole -->
  <filter id="bulge" x="0" y="0" width="100%" height="100%"
          color-interpolation-filters="sRGB">
    <feImage id="bulgemap" x="0" y="0" width="800" height="600"
             preserveAspectRatio="none" result="map"/>
    <feDisplacementMap in="SourceGraphic" in2="map" scale="26"
                       xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- unsharp-mask style convolution kernel; strength is a lerp between the
       identity matrix (center 1, rest 0 = no-op) and the classic sharpen
       kernel (center 5, edges -1), set at runtime from settings.sharpen -->
  <filter id="sharpen" x="0" y="0" width="100%" height="100%"
          color-interpolation-filters="sRGB">
    <feConvolveMatrix id="sharpenMatrix" order="3" kernelMatrix="0 0 0 0 1 0 0 0 0"
                       divisor="1" preserveAlpha="true" edgeMode="duplicate"/>
  </filter>
</svg>

<!-- flat-mode pause icon: replaces the 3D canvas's green corner bars with a
     centered, neutral one — see drawOSD()'s pause-bars block for the 3D twin -->
<div id="pauseIcon"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></div>
<!-- buffering: a small, barely-there spinner — same in both modes, see the
     'waiting' listener above for why this needs to exist (archive.org cold-starts) -->
<div id="bufferSpin"></div>

<!-- flat-mode-only settings panel: real DOM controls skinned to match the
     HUD, sized/positioned to sit above it instead of getting cut off by it.
     3D mode keeps the original canvas-drawn settings menu untouched. -->
<div id="flatSettings">
  <h2>Settings</h2>
  <div id="fsBody"></div>
  <div id="fsFooter">
    <button id="fsReset" type="button">Reset</button>
    <button id="fsClose" type="button">Close</button>
  </div>
</div>

<!-- flat-mode-only episode list: same treatment as #flatSettings above.

      if (x >= r.left - 8 && x <= hitRight + 8) { epIndex = n; partIndex = 0; fails = 0; load(); toggleList(); return; }
    }
    toggleList();   // a click in the margins just closes the list
    return;
  }
  if (hit.object === screenMesh) {
    const u = hit.uv.x, y = 1 - hit.uv.y;
    if (u < 0.115) { chunk(-1); if (SEGKIND !== 'none') popup('ch'); }
    else if (u > 0.885) { chunk(1); if (SEGKIND !== 'none') popup('ch'); }
    else if (y < 0.115 && u > 0.23 && u < 0.77) { v.volume = Math.min(1, v.volume + 0.1); popup('vol'); }
    else if (y > 0.885 && u > 0.23 && u < 0.77) { v.volume = Math.max(0, v.volume - 0.1); popup('vol'); }
    else if (performance.now() - listClosedAt > 400) {
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        if (osdMode !== 'list') v.paused ? v.play() : v.pause();
      }, 250);
    }
    return;
  }
  const p = tvRoot.worldToLocal(hit.point.clone());
  if (p.y < -0.28 || p.y > -0.21 || p.x < 1.2) return;
  BUTTONS.find(b => p.z >= b[0] && p.z < b[1])?.[2]();
  holdDir = 0;
});

renderer.domElement.addEventListener('contextmenu', e => { e.preventDefault(); toggleList(); });

let setZoomLimits = () => {};
function size() {
  renderer.setSize(innerWidth, innerHeight);
  cssR.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  setZoomLimits();
  layoutFlat();
}
addEventListener('resize', size);
// corner label fades out after 5s with no mouse movement; window-level (not
// renderer.domElement) so it still resets even when the mouse is sitting
// over a UI element like a corner button that's on top of the canvas
let lastMoveTime = performance.now();
addEventListener('mousemove', () => { lastMoveTime = performance.now(); });
addEventListener('keydown', () => { lastMoveTime = performance.now(); }); // remote input wakes the HUD too

// scrubber: click or drag anywhere on the bar to seek immediately (unlike the
// mouse hold-to-scrub on the 3D screen edges, a literal progress bar is
// expected to seek on drag, not after a hold delay)
let scrubDragging = false;
function scrubSeek(e) {
  const r = scrub.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  seekVirtual(frac * vDur());
}
scrub.addEventListener('pointerdown', e => {
  scrubDragging = true;
  scrub.setPointerCapture(e.pointerId);
  scrubSeek(e);
});
scrub.addEventListener('pointermove', e => { if (scrubDragging) scrubSeek(e); });
scrub.addEventListener('pointerup', () => { scrubDragging = false; });
size();
loadSettings();
setFlatMode(!settings.mode3d); // restore persisted mode, default flat
updateScreenFilters();

// --- TV remote (Tizen) + keyboard control -----------------------------------
// The player was built for mouse/3D-button input; on a TV the remote drives it
// instead. D-pad Left/Right page episodes, Up/Down are volume, OK is play/pause,
// the color buttons expose guide/3D/settings/captions, Return goes back. Media
// and color keys must be registered so the runtime delivers them (no-op in a
// desktop browser, where the arrow/Enter keys still work).
try {
  if (window.tizen && tizen.tvinputdevice) {
    ['MediaPlayPause', 'MediaPlay', 'MediaPause', 'MediaFastForward', 'MediaRewind',
     'ColorF0Red', 'ColorF1Green', 'ColorF2Yellow', 'ColorF3Blue']
      .forEach(k => { try { tizen.tvinputdevice.registerKey(k); } catch (e) {} });
  }
} catch (e) {}
// ---- D-pad navigation of the OSD overlays ----------------------------------
const listIndicesTV = () => GROUPING === 'season' ? SEASONS[curSeason].indices : EPISODES.map((_, n) => n);
const listTopY = () => GROUPING === 'season' ? 140 : 300;
// nudge listScroll so the selected row sits within the visible band on the
// 600-tall canvas (rows are drawn at topY + i*LH - listScroll)
function ensureListVisible() {
  const top = listTopY();
  const rowY = top + listSel * LH - listScroll;
  const lo = top + 10, hi = 560;
  if (rowY < lo) listScroll -= (lo - rowY);
  else if (rowY > hi) listScroll += (rowY - hi);
  const max = Math.max(0, (listIndicesTV().length - 1) * LH);
  listScroll = Math.min(Math.max(listScroll, 0), max);
}
function initListSel() {
  const idx = listIndicesTV();
  listSel = GROUPING === 'season' ? Math.max(0, idx.indexOf(epIndex)) : epIndex;
  hoveredRow = idx[listSel]; hoverRowSince = performance.now();
  ensureListVisible();
}
function listNav(d) {
  const idx = listIndicesTV();
  listSel = Math.max(0, Math.min(idx.length - 1, listSel + d));
  hoveredRow = idx[listSel]; hoverRowSince = performance.now();
  ensureListVisible();
}
function listOpen() { epIndex = listIndicesTV()[listSel]; partIndex = 0; fails = 0; load(); toggleList(); }
function setActivate() {
  const r = SETTINGS_ROWS[setSel];
  if (r.type === 'check') { settings[r.k] = !settings[r.k]; updateScreenFilters(); }
  else if (r.k === 'reset') resetSettings();
  else if (r.k === 'close') { osdMode = null; controls.enableZoom = true; }
}
function setAdjust(d) {
  const r = SETTINGS_ROWS[setSel];
  if (r.type === 'check') { settings[r.k] = !settings[r.k]; updateScreenFilters(); }
  else if (r.min !== undefined) {
    settings[r.k] = Math.max(r.min, Math.min(r.max, settings[r.k] + d * r.step));
    updateScreenFilters();
  }
}
const CLOSE_SET = () => { osdMode = null; controls.enableZoom = true; };

addEventListener('keydown', e => {
  const K = e.keyCode;

  // --- flat-mode settings panel open: same shape as the 3D 'set' block
  // below, just driving real <input> elements instead of canvas coordinates ---
  if (flatSettingsOpen) {
    const el = fsRows[fsSel];
    switch (K) {
      case 38: fsSel = Math.max(0, fsSel - 1); fsFocusRow(); break;             // up
      case 40: fsSel = Math.min(fsRows.length - 1, fsSel + 1); fsFocusRow(); break; // down
      case 37:                                                                   // left -> decrease/toggle
        if (el.type === 'range') { el.value = Math.max(+el.min, +el.value - +el.step); el.dispatchEvent(new Event('input')); }
        else if (el.type === 'checkbox') el.click();
        break;
      case 39:                                                                   // right -> increase/toggle
        if (el.type === 'range') { el.value = Math.min(+el.max, +el.value + +el.step); el.dispatchEvent(new Event('input')); }
        else if (el.type === 'checkbox') el.click();
        break;
      case 13: case 10252: case 415: el.click(); break;                          // OK
      case 405: case 10009: case 27: case 83: closeFlatSettings(); break;        // Yellow/Back/Esc/s
      default: return;
    }
    e.preventDefault(); return;
  }

  // --- flat-mode episode list open: same shape as the 3D 'list' block below ---
  if (flatEpisodesOpen) {
    switch (K) {
      case 38: feSel = Math.max(0, feSel - 1); feFocusRow(); break;                    // up
      case 40: feSel = Math.min(feRows.length - 1, feSel + 1); feFocusRow(); break;    // down
      case 37: if (GROUPING === 'season' && SEASONS.length > 1) feSelectSeason(feSeason - 1); break; // left -> prev season
      case 39: if (GROUPING === 'season' && SEASONS.length > 1) feSelectSeason(feSeason + 1); break; // right -> next season
      case 13: case 10252: case 415: feRows[feSel]?.click(); break;                    // OK -> play it
      case 403: case 10009: case 27: case 71: closeFlatEpisodes(); break;              // Red/Back/Esc/g -> close
      default: return;
    }
    e.preventDefault(); return;
  }

  // --- episode guide open: the D-pad walks the list ---
  if (osdMode === 'list') {
    switch (K) {
      case 38: listNav(-1); break;                                   // up
      case 40: listNav(1); break;                                    // down
      case 37: if (GROUPING === 'season' && SEASONS.length > 1) { gotoSeason(-1); listSel = 0; ensureListVisible(); } break;
      case 39: if (GROUPING === 'season' && SEASONS.length > 1) { gotoSeason(1);  listSel = 0; ensureListVisible(); } break;
      case 13: case 10252: case 415: listOpen(); break;              // OK -> play it
      case 403: case 10009: case 27: case 71: toggleList(); break;   // Red / Back / Esc / g -> close
      default: return;
    }
    e.preventDefault(); return;
  }

  // --- settings open: the D-pad walks the controls ---
  if (osdMode === 'set') {
    switch (K) {
      case 38: setSel = Math.max(0, setSel - 1); break;              // up
      case 40: setSel = Math.min(SETTINGS_ROWS.length - 1, setSel + 1); break; // down
      case 37: setAdjust(-1); break;                                 // left  -> decrease / toggle
      case 39: setAdjust(1); break;                                  // right -> increase / toggle
      case 13: case 10252: case 415: setActivate(); break;           // OK
      case 405: case 10009: case 27: case 83: CLOSE_SET(); break;    // Yellow / Back / Esc / s -> close
      default: return;
    }
    e.preventDefault(); return;
  }

  // --- normal playback ---
  switch (K) {
    case 13: case 10252: case 415:  // OK / PlayPause / Play
      v.paused ? v.play() : v.pause(); break;
    case 19:                         // Pause
      v.pause(); break;
    case 39: case 417:               // Right / FastForward -> tap: next episode; hold: scrub
      seekKeyDown(K, 1); break;
    case 37: case 412:               // Left / Rewind -> tap: previous episode; hold: scrub
      seekKeyDown(K, -1); break;
    case 38:                         // Up -> volume up
      v.volume = Math.min(1, v.volume + 0.1); popup('vol'); break;
    case 40:                         // Down -> volume down
      v.volume = Math.max(0, v.volume - 0.1); popup('vol'); break;
    // color buttons on a TV; the letter in each comment is the desktop-test key
    case 403: case 71:               // Red / g     -> episode guide
      toggleList(); initListSel(); break;
    case 404: case 68:               // Green / d   -> flip the 3D CRT mode
      setFlatMode(!flatMode); break;
    case 405: case 83:               // Yellow / s  -> settings
      toggleSettingsMenu(); setSel = 0; break;
    case 406: case 67:               // Blue / c    -> captions
      setCC(!ccOn); break;
    case 10009: case 27:             // Return / Esc -> back (same target as the #back button)
      location.href = back.href; break;
    default: return;
  }
  e.preventDefault();
});

renderer.setAnimationLoop(() => {
  if (isHolding) {
    const accel = 1 + Math.max(0, (performance.now() - holdStart) / 1000) * 2;
    holdTime = Math.max(0, Math.min(vDur(), holdTime + holdDir * 0.15 * accel));
  }
  if (isHoldingVol) {
    holdVol = Math.max(0, Math.min(1, holdVol + volDir * 0.005));
    v.volume = holdVol;
  }
  controls.update();
  const idle = performance.now() - lastMoveTime > 2000;
  hud.classList.toggle('idle', idle);
  back.classList.toggle('idle', idle); // fades with the HUD, same rules (stays on in 3D)
  if (!scrubDragging) {
    const t = isHolding ? holdTime : vCur(), d = vDur();
    const pct = d ? Math.max(0, Math.min(100, t / d * 100)) : 0;
    scrubFill.style.width = pct + '%';
    scrubThumb.style.left = pct + '%';
    curT.textContent = fmt(t);
    durT.textContent = fmt(d);
  }
  drawOSD();
  glow.color.lerp(glowTargetColor, 0.03); // ease the shell light between minute-frames
  // a lit room washes out the screen's glow on the shell
  glow.intensity += ((tvOn ? glowTargetIntensity * (lit ? 0.2 : 1) : 0) - glow.intensity) * 0.03;
  if (!flatMode) { cssR.render(scene, cam); renderer.render(scene, cam); }
});

load(); // selecting the episode in the guide was the play gesture — no extra click needed; called
        // here (not earlier) because it reaches into consts/lets this script only finishes declaring by now
</script>
